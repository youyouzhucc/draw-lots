<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>职场每日占卜</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>
  <div class="container">
    <header>
      <div id="datetime" class="datetime">
        <div id="datetime-date" class="datetime-date"></div>
        <div class="datetime-time">
          <div class="flip-block"><span id="flip-hour" class="flip-num">00</span></div>
          <span class="flip-sep">:</span>
          <div class="flip-block"><span id="flip-min" class="flip-num">00</span></div>
          <span class="flip-sep">:</span>
          <div class="flip-block"><span id="flip-sec" class="flip-num">00</span></div>
        </div>
      </div>
      <h1>职场每日占卜</h1>
      <p class="subtitle">输入信息，抽取今日职场运势</p>
    </header>

    <main>
      <div class="mode-tabs">
        <button type="button" class="mode-tab active" data-mode="draw">抽签</button>
        <button type="button" class="mode-tab" data-mode="liuyao">六爻</button>
      </div>

      <section id="section-draw" class="form-section">
        <form id="form">
          <div class="form-row">
            <label>生日 <span class="required">*</span></label>
            <div class="birth-inputs">
              <select id="month" required>
                <option value="">月</option>
                <option value="1">1月</option>
                <option value="2">2月</option>
                <option value="3">3月</option>
                <option value="4">4月</option>
                <option value="5">5月</option>
                <option value="6">6月</option>
                <option value="7">7月</option>
                <option value="8">8月</option>
                <option value="9">9月</option>
                <option value="10">10月</option>
                <option value="11">11月</option>
                <option value="12">12月</option>
              </select>
              <select id="day" required>
                <option value="">日</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <label>昵称</label>
            <input type="text" id="name" placeholder="可选，用于个性化称呼" />
          </div>
          <div class="form-row">
            <label>当前关注</label>
            <select id="focus">
              <option value="">-- 可选 --</option>
              <option value="职场氛围">防小人</option>
              <option value="升职加薪">求加薪</option>
              <option value="跳槽转岗">想跳槽</option>
              <option value="面试求职">面试顺利</option>
              <option value="项目推进">项目起飞</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit" id="draw-btn">抽签</button>
            <button type="button" id="reset-btn">重置</button>
          </div>
        </form>
      </section>

      <section id="section-liuyao" class="form-section hidden">
        <div class="liuyao-intro">
          <p class="liuyao-desc">六爻源于《易经》，以三枚硬币投掷六次得一卦，共六十四卦。心诚则灵，默念所问之事后点击摇卦。</p>
          <p class="liuyao-rule">每日仅可摇卦一次，以示诚心。</p>
        </div>
        <div class="liuyao-actions">
          <button type="button" id="liuyao-btn" class="liuyao-btn">摇卦</button>
        </div>
        <p id="liuyao-limit-msg" class="liuyao-limit-msg hidden">今日已摇过卦，请明日再来。</p>
        <div id="liuyao-result" class="liuyao-result hidden">
          <div id="liuyao-hexagram" class="liuyao-hexagram"></div>
          <div id="liuyao-name" class="liuyao-name"></div>
          <div id="liuyao-meaning" class="liuyao-meaning"></div>
          <div class="liuyao-explain">
            <div class="explain-title">如何解读</div>
            <p><strong>卦象</strong>：六条线从上到下依次为上爻、五爻、四爻、三爻、二爻、初爻，由六次投掷所得。</p>
            <p><strong>阳爻 ——</strong> 实线，代表阳刚、主动、进取。</p>
            <p><strong>阴爻 — —</strong> 断线，代表阴柔、顺应、守成。</p>
            <p>六十四卦各有卦辞，结合职场情境给出运势参考，仅供娱乐。</p>
          </div>
        </div>
      </section>

      <section id="result" class="result-section hidden">
        <div id="sign-card" class="sign-card"></div>
      </section>
    </main>

    <footer>
      <p>每日一签，同一天同一人生成的签文固定 · 仅供娱乐</p>
    </footer>
  </div>
  <script src="signs.js?v=5"></script>
  <script src="hexagrams.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
